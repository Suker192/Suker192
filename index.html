<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Um Presente para Você!</title>
    <style>
        /* Fundo verde com degradê preto */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: linear-gradient(to bottom, #11998e, #000000);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        /* Container que centraliza tudo */
        .container {
            position: relative;
            width: 300px;
            height: 300px;
            cursor: pointer;
        }

        /* Estilo da foto do amigo */
        .photo {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
            z-index: 1;
            border: 5px solid #fff;
            box-sizing: border-box;
        }

        /* Classe ativada no clique para mostrar a foto */
        .photo.revealed {
            opacity: 1;
        }

        /* Estilo do presente (Caixa) */
        .gift-box {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #e74c3c;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Animação de queda suave */
            transition: transform 1s cubic-bezier(0.55, 0.085, 0.68, 0.53), opacity 1s;
        }

        /* Fita vertical do presente */
        .gift-box::before {
            content: '';
            position: absolute;
            width: 40px;
            height: 100%;
            background-color: #f1c40f;
        }

        /* Fita horizontal do presente */
        .gift-box::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 40px;
            background-color: #f1c40f;
        }

        /* Texto no presente */
        .gift-box p {
            position: absolute;
            z-index: 3;
            background: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            color: #e74c3c;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            pointer-events: none; /* Evita bugar o clique */
        }

        /* Classe que faz o presente cair e girar */
        .gift-box.fall {
            transform: translateY(150vh) rotate(45deg);
            opacity: 0;
        }
    </style>
</head>
<body>

    <div class="container" id="giftContainer">
        <img src="Presente.jpg" alt="Foto Surpresa" class="photo" id="friendPhoto">
        
        <div class="gift-box" id="giftBox">
            <p>Clique para Abrir!</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <script>
        const giftBox = document.getElementById('giftBox');
        const friendPhoto = document.getElementById('friendPhoto');
        const giftContainer = document.getElementById('giftContainer');

        // Carrega os áudios
        const somClique = new Audio('clique.mp3');
        const musicaFundo = new Audio('musica.mp3');

        giftContainer.addEventListener('click', () => {
            // Desativa os cliques extras
            giftContainer.style.pointerEvents = 'none';

            // Toca o som do clique (ex: um efeito sonoro de caixa abrindo ou "pop")
            somClique.play();

            // Faz a caixa de presente cair
            giftBox.classList.add('fall');

            // Revela a foto que está atrás
            friendPhoto.classList.add('revealed');

            // Dispara a chuva de confetes e a música após um pequeno delay (200ms)
            setTimeout(() => {
                // Inicia a música de fundo
                musicaFundo.play();

                var duration = 4 * 1000; // Confetes duram 4 segundos
                var end = Date.now() + duration;

                (function frame() {
                    // Confetes da esquerda
                    confetti({
                        particleCount: 5,
                        angle: 60,
                        spread: 55,
                        origin: { x: 0 },
                        colors: ['#2ecc71', '#f1c40f', '#e74c3c', '#3498db']
                    });
                    // Confetes da direita
                    confetti({
                        particleCount: 5,
                        angle: 120,
                        spread: 55,
                        origin: { x: 1 },
                        colors: ['#2ecc71', '#f1c40f', '#e74c3c', '#3498db']
                    });

                    if (Date.now() < end) {
                        requestAnimationFrame(frame);
                    }
                }());
            }, 200); 
        });
    </script>
</body>
</html>
