<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Um Presente Especial</title>

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&display=swap" rel="stylesheet">

<style>
/* FUNDO FIXO - ADEUS TELA BRANCA */
html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    background: radial-gradient(circle at center, #1e3a2b 0%, #0f0f0f 100%);
    background-attachment: fixed;
    font-family: Arial, sans-serif;
    color: white;
    overflow-x: hidden;
}

/* EFEITO LIQUID GLASS */
.glass {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 20px;
}

/* INTRO */
.intro-screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 100;
    transition: 1s;
}

.intro-screen p {
    font-family: 'Caveat', cursive;
    font-size: 28px;
    text-align: center;
    padding: 20px;
}

/* DESENHO DIGITAL (AGORA FIXO) */
.digital-screen {
    position: fixed;
    inset: 0;
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 50;
    transition: 1s;
}

.digital-img {
    width: 300px;
    max-width: 85%;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    opacity: 0;
    transform: scale(0.9);
    transition: 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.digital-img.show {
    opacity: 1;
    transform: scale(1);
}

/* VINIL */
.vinil-container {
    position: fixed;
    bottom: 20px;
    left: 20px;
    width: 100px;
    height: 100px;
    opacity: 0;
    z-index: 80;
    transition: 1s;
}
.vinil {
    width: 100%;
    animation: spin 4s linear infinite;
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* BOTÕES */
button {
    margin-top: 25px;
    padding: 12px 30px;
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 30px;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
    backdrop-filter: blur(5px);
}
button:hover {
    background: rgba(255, 255, 255, 0.2);
    transform: scale(1.05);
}

/* CONTEÚDO PRINCIPAL (CAIXA) */
.main-content {
    display: none;
    flex-direction: column;
    align-items: center;
    padding: 50px 20px;
    min-height: 100vh;
}

.gift-container {
    position: relative;
    width: 280px;
    height: 280px;
    cursor: pointer;
}

.gift-box {
    position: absolute;
    inset: 0;
    background: #e74c3c;
    border-radius: 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 2;
    transition: 1s;
    box-shadow: 0 10px 20px rgba(0,0,0,0.4);
}
.gift-box::before { content: ''; position: absolute; width: 40px; height: 100%; background: #f1c40f; }
.gift-box::after { content: ''; position: absolute; width: 100%; height: 40px; background: #f1c40f; }

.revealed-card {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
    opacity: 0;
    transition: 0.8s;
}

/* ANIMAÇÕES */
.shake { animation: shake 0.4s; }
@keyframes shake {
    0%, 100% { transform: rotate(0); }
    25% { transform: rotate(-5deg); }
    75% { transform: rotate(5deg); }
}
.fall { transform: translateY(150vh) rotate(45deg); opacity: 0; }

.message { font-family: 'Caveat', cursive; font-size: 26px; opacity: 0; transition: 1s; margin: 10px 0; }

/* TELA EXTRA */
#extraScreen {
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}
</style>
</head>
<body>

<div class="intro-screen" id="intro">
    <p>Não consegui te ver pessoalmente...<br>então fiz isso aqui.</p>
    <button id="startBtn">Abrir</button>
</div>

<div class="digital-screen" id="digitalScreen">
    <img src="digital.png" class="digital-img" id="digitalImg">
    <button id="nextToGift" style="opacity:0; transition: 1s;">Ver Presente ➔</button>
</div>

<div class="vinil-container" id="vinilContainer">
    <img src="vinil.png" class="vinil">
</div>

<div class="main-content" id="mainContent">
    <div class="gift-container" id="giftContainer">
        <div class="glass revealed-card" id="revealedCard">
            <p class="message" id="m1">Feliz aniversário, irmão! 🎉</p>
            <p class="message" id="m2">Tu é importante demais pra mim.</p>
            <p class="message" id="m3">Isso aqui é só o começo...</p>
        </div>
        <div class="gift-box" id="giftBox">
            <b id="clickText">Aperte 3 vezes!</b>
        </div>
    </div>
    <button id="moreBtn" style="display:none;">mais</button>
</div>

<div id="extraScreen">
    <p class="message" style="opacity:1; font-size: 32px;">Algum dia essa caixa vai chegar até você.</p>
    <img src="caixa.png" style="width: 200px; margin-top: 20px;">
    <button onclick="location.reload()">Recomeçar</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
const musica = new Audio('aero.mp3');
musica.loop = true;

const startBtn = document.getElementById('startBtn');
const digitalScreen = document.getElementById('digitalScreen');
const digitalImg = document.getElementById('digitalImg');
const nextBtn = document.getElementById('nextToGift');
const mainContent = document.getElementById('mainContent');

// 1. INÍCIO
startBtn.onclick = () => {
    musica.play();
    document.getElementById('intro').style.opacity = '0';
    setTimeout(() => {
        document.getElementById('intro').style.display = 'none';
        digitalScreen.style.display = 'flex';
        document.getElementById('vinilContainer').style.opacity = '1';
        
        setTimeout(() => {
            digitalImg.classList.add('show');
            nextBtn.style.opacity = '1'; // Botão aparece depois do desenho
        }, 500);
    }, 1000);
};

// 2. DO DESENHO PARA A CAIXA
nextBtn.onclick = () => {
    digitalScreen.style.opacity = '0';
    setTimeout(() => {
        digitalScreen.style.display = 'none';
        mainContent.style.display = 'flex';
    }, 1000);
};

// 3. LÓGICA DA CAIXA
let clicks = 0;
const box = document.getElementById('giftBox');
const giftContainer = document.getElementById('giftContainer');

giftContainer.onclick = () => {
    if(clicks < 3) {
        clicks++;
        box.classList.remove('shake');
        void box.offsetWidth;
        box.classList.add('shake');
        document.getElementById('clickText').innerText = `Faltam ${3-clicks}!`;
    }

    if(clicks === 3) {
        giftContainer.style.pointerEvents = 'none';
        box.classList.add('fall');
        document.getElementById('revealedCard').style.opacity = '1';
        
        // Confetes
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });

        setTimeout(() => document.getElementById('m1').style.opacity = '1', 800);
        setTimeout(() => document.getElementById('m2').style.opacity = '1', 1800);
        setTimeout(() => document.getElementById('m3').style.opacity = '1', 2800);
        setTimeout(() => document.getElementById('moreBtn').style.display = 'block', 4000);
    }
};

// 4. TELA FINAL
document.getElementById('moreBtn').onclick = () => {
    mainContent.style.display = 'none';
    document.getElementById('extraScreen').style.display = 'flex';
};
</script>

</body>
</html>
