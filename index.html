<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Um Presente Especial</title>

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&display=swap" rel="stylesheet">

<style>

/* FUNDO FIXO (REMOVE FLASH BRANCO) */
html, body {
    margin: 0;
    padding: 0;
    background-color: #0f0f0f;
    overflow-x: hidden;
}

/* FUNDO ANIMADO */
body {
    background: linear-gradient(-45deg, #0f0f0f, #1e3a2b, #0a1f13, #0f0f0f);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    font-family: Arial, sans-serif;
    color: white;
}

@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* GLASS */
.glass {
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(12px);
    border-radius: 20px;
}

/* BOTÕES (REMOVE BRANCO FEIO) */
button {
    background: rgba(255,255,255,0.08);
    color: white;
    border: 1px solid rgba(255,255,255,0.2);
    padding: 10px 25px;
}

/* INTRO */
.intro-screen {
    position: fixed;
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 20;
    background: transparent;
    transition: 1s;
}

.fade {
    opacity: 0;
    transform: translateY(20px);
    transition: 1.2s ease;
}
.fade.show {
    opacity: 1;
    transform: translateY(0);
}

.intro-screen p {
    font-family: 'Caveat', cursive;
    font-size: 32px;
    text-align: center;
}

/* DESENHO */
.digital-screen {
    position: fixed;
    width: 100%;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #0f0f0f;
    opacity: 0;
    transition: 1.5s;
    z-index: 15;
}

.digital-img {
    width: 280px;
    max-width: 85%;
    border-radius: 15px;
    opacity: 0;
    transform: scale(1.4);
    transition: 2s ease;
}
.digital-img.show {
    opacity: 1;
    transform: scale(1);
}

/* VINIL */
.vinil-container {
    position: fixed;
    bottom: 15px;
    left: 15px;
    width: 90px;
    height: 90px;
    opacity: 0;
    transition: 1.5s;
    z-index: 5;
}
.vinil {
    width: 100%;
    animation: spin 5s linear infinite;
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* MAIN */
.main {
    display: none;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding-top: 10vh;
}

/* PRESENTE */
.container {
    position: relative;
    width: 280px;
    height: 280px;
    cursor: pointer;
}

.glass-card {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    opacity: 0;
    transition: 0.8s;
}
.glass-card.revealed {
    opacity: 1;
}

.gift-box {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #e74c3c;
    border-radius: 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: 1s;
}

@keyframes shake {
    50% { transform: translateX(-3px); }
}
.shake { animation: shake 0.4s; }

.fall {
    transform: translateY(120vh);
    opacity: 0;
}

/* TEXTO */
.message {
    font-family: 'Caveat', cursive;
    font-size: 28px;
    opacity: 0;
    transition: 1s;
}

/* BOTÃO MAIS */
#moreBtn {
    margin-top: 30px;
    opacity: 0;
}

/* EXTRA */
#extraScreen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
}

.extra-phrase {
    font-family: 'Caveat', cursive;
    font-size: 34px;
    opacity: 0;
}

.final-box {
    width: 200px;
    opacity: 0;
    transition: 1.5s;
}
.final-box.show {
    opacity: 1;
}

</style>
</head>

<body>

<div class="intro-screen" id="intro">
    <p class="fade" id="introText">
        Não consegui te ver pessoalmente… então fiz isso aqui
    </p>
    <button class="fade start-btn glass" id="startBtn">Abrir Presente</button>
</div>

<div class="digital-screen" id="digitalScreen">
    <img src="digital.png" class="digital-img" id="digitalImg">
</div>

<div class="vinil-container" id="vinilContainer">
    <img src="vinil.png" class="vinil">
</div>

<div class="main" id="mainContent">

<div class="container" id="giftContainer">

    <div class="glass glass-card" id="glassCard">
        <p class="message" id="msg1">Feliz aniversário, irmão 🎉</p>
        <p class="message" id="msg2">Tu é importante pra caramba pra mim</p>
        <p class="message" id="msg3">Isso aqui é só uma parte…</p>
    </div>

    <div class="gift-box" id="giftBox">
        <p id="clickText">Aperte 3 vezes!</p>
    </div>

</div>

<button id="moreBtn" class="glass">mais</button>

</div>

<div id="extraScreen">
<p class="extra-phrase" id="extraPhrase">
algum dia essa caixa vai chegar até você
</p>
<img src="caixa.png" class="final-box" id="finalBox">
<button onclick="voltar()" class="glass">voltar</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
const introText = document.getElementById('introText');
const startBtn = document.getElementById('startBtn');
const intro = document.getElementById('intro');

const digitalScreen = document.getElementById('digitalScreen');
const digitalImg = document.getElementById('digitalImg');
const vinilContainer = document.getElementById('vinilContainer');

const main = document.getElementById('mainContent');

const musicaIntro = new Audio('aero.mp3');
musicaIntro.loop = true;

setTimeout(()=> introText.classList.add('show'),200);
setTimeout(()=> startBtn.classList.add('show'),1800);

startBtn.onclick = () => {
    musicaIntro.play();

    intro.style.opacity = 0;

    setTimeout(()=>{
        intro.style.display='none';
        digitalScreen.style.opacity = 1;
        vinilContainer.style.opacity = 1;

        setTimeout(()=> digitalImg.classList.add('show'),200);

        let end = Date.now()+3000;
        (function frame(){
            confetti({particleCount:6,angle:60,spread:70,origin:{x:0}});
            confetti({particleCount:6,angle:120,spread:70,origin:{x:1}});
            if(Date.now()<end) requestAnimationFrame(frame);
        })();

        setTimeout(()=>{
            digitalScreen.style.opacity=0;

            setTimeout(()=>{
                digitalScreen.style.display='none';
                main.style.display='flex';
            },800);

        },4000);

    },1000);
};

const box = document.getElementById('giftBox');
const glassCard = document.getElementById('glassCard');
const container = document.getElementById('giftContainer');
const clickText = document.getElementById('clickText');

const msg1 = document.getElementById('msg1');
const msg2 = document.getElementById('msg2');
const msg3 = document.getElementById('msg3');
const moreBtn = document.getElementById('moreBtn');

let clicks = 0;

container.addEventListener('click', () => {
    clicks++;

    box.classList.remove('shake');
    void box.offsetWidth;

    if (clicks < 3) {
        box.classList.add('shake');
        clickText.innerText = `Faltam ${3 - clicks}!`;
    }

    if (clicks === 3) {
        box.classList.add('fall');
        glassCard.classList.add('revealed');

        let end = Date.now()+4000;
        (function frame(){
            confetti({particleCount:6,angle:60,spread:60,origin:{x:0}});
            confetti({particleCount:6,angle:120,spread:60,origin:{x:1}});
            if(Date.now()<end) requestAnimationFrame(frame);
        })();

        setTimeout(()=> msg1.style.opacity=1,800);
        setTimeout(()=> msg2.style.opacity=1,2000);
        setTimeout(()=> msg3.style.opacity=1,3500);
        setTimeout(()=> moreBtn.style.opacity=1,5000);
    }
});

const extraScreen = document.getElementById('extraScreen');
const extraPhrase = document.getElementById('extraPhrase');
const finalBox = document.getElementById('finalBox');

moreBtn.onclick = () => {
    main.style.display='none';
    extraScreen.style.display='flex';

    setTimeout(()=> extraPhrase.style.opacity=1,200);
    setTimeout(()=> finalBox.classList.add('show'),2000);
};

function voltar(){
    extraScreen.style.display='none';
    main.style.display='flex';
    finalBox.classList.remove('show');
    extraPhrase.style.opacity=0;
}
</script>

</body>
</html>
