<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Um Presente Especial</title>

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    padding: 0;
    background: linear-gradient(to bottom, #2ecc71, #0f0f0f);
    font-family: Arial, sans-serif;
    color: white;
    overflow-x: hidden;
}

/* ANIMAÇÕES GERAIS */
.fade {
    opacity: 0;
    transform: translateY(20px);
    transition: all 1.2s ease;
}
.fade.show {
    opacity: 1;
    transform: translateY(0);
}

/* INTRO */
.intro-screen {
    position: fixed;
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: linear-gradient(to bottom, #2ecc71, #0f0f0f);
    z-index: 10;
    transition: 1s ease;
}

.intro-text {
    font-size: 24px;
    text-align: center;
    max-width: 80%;
}

.start-btn {
    margin-top: 25px;
    padding: 12px 28px;
    font-size: 18px;
    border: none;
    border-radius: 25px;
    background: white;
    color: #2ecc71;
    cursor: pointer;
    transition: 0.3s;
}
.start-btn:hover {
    transform: scale(1.05);
}

/* DESENHO */
.digital-screen {
    position: fixed;
    width: 100%;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(to bottom, #2ecc71, #0f0f0f);
    opacity: 0;
    z-index: 9;
    transition: opacity 1.5s ease;
}

.digital-img {
    width: 280px;
    opacity: 0;
    transform: scale(1.4);
    transition: all 2s ease;
}
.digital-img.show {
    opacity: 1;
    transform: scale(1);
}

/* MAIN */
.main {
    display: none;
    flex-direction: column;
    align-items: center;
    padding-top: 40px;
    animation: fadeMain 1.5s ease;
}
@keyframes fadeMain {
    from { opacity: 0; }
    to { opacity: 1; }
}

/* PRESENTE */
.container {
    position: relative;
    width: 300px;
    height: 300px;
    cursor: pointer;
    margin-bottom: 20px;
}

.photo {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 15px;
    opacity: 0;
    transition: opacity 0.8s ease;
}
.photo.revealed {
    opacity: 1;
}

.gift-box {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #e74c3c;
    border-radius: 15px;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    transition: transform 1s ease, opacity 1s ease;
}

.gift-box::before {
    content: '';
    position: absolute;
    width: 40px;
    height: 100%;
    background: #f1c40f;
}
.gift-box::after {
    content: '';
    position: absolute;
    width: 100%;
    height: 40px;
    background: #f1c40f;
}

.gift-box p {
    background: white;
    color: #e74c3c;
    padding: 10px 20px;
    border-radius: 20px;
    font-weight: bold;
}

/* SHAKE MAIS SUAVE */
@keyframes shake {
    0% { transform: translate(1px,1px); }
    25% { transform: translate(-2px,2px); }
    50% { transform: translate(2px,-2px); }
    75% { transform: translate(-1px,1px); }
    100% { transform: translate(1px,-1px); }
}
.shake {
    animation: shake 0.5s ease;
}

/* QUEDA MAIS SUAVE */
.fall {
    transform: translateY(160vh) rotate(40deg);
    opacity: 0;
}

/* MENSAGENS */
.message {
    font-family: 'Caveat', cursive;
    font-size: 26px;
    text-align: center;
    opacity: 0;
    transition: all 1s ease;
    margin: 10px;
}

/* FINAL */
.final {
    opacity: 0;
    margin-top: 60px;
    text-align: center;
    transition: opacity 2s ease;
}
.final img {
    width: 220px;
    border-radius: 15px;
    margin-top: 10px;
}
</style>
</head>

<body>

<!-- INTRO -->
<div class="intro-screen" id="intro">
    <p class="intro-text fade" id="introText">
        Não consegui te ver pessoalmente… então fiz isso aqui
    </p>
    <button class="start-btn fade" id="startBtn">vá</button>
</div>

<!-- DESENHO -->
<div class="digital-screen" id="digitalScreen">
    <img src="digital.png" class="digital-img" id="digitalImg">
</div>

<!-- MAIN -->
<div class="main" id="mainContent">

    <div class="container" id="giftContainer">
        <img src="Presente.jpg" class="photo" id="friendPhoto">

        <div class="gift-box" id="giftBox">
            <p id="clickText">Aperte 3 vezes!</p>
        </div>
    </div>

    <p class="message" id="msg1">Feliz aniversário, irmão 🎉</p>
    <p class="message" id="msg2">Tu é importante pra caramba pra mim</p>
    <p class="message" id="msg3">Isso aqui é só uma parte…</p>

    <div class="final" id="final">
        <p class="message" style="opacity:1;">
            Eu queria muito te entregar essa caixa…<br>
            mas de algum jeito,<br>
            <b>eu vou fazer ela chegar até você</b>
        </p>
        <img src="caixa.png">
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
const introText = document.getElementById('introText');
const startBtn = document.getElementById('startBtn');
const intro = document.getElementById('intro');

const digitalScreen = document.getElementById('digitalScreen');
const digitalImg = document.getElementById('digitalImg');

const main = document.getElementById('mainContent');

const musicaIntro = new Audio('aero.mp3');
const musica = new Audio('musica.mp3');

setTimeout(() => {
    introText.classList.add('show');
}, 200);

setTimeout(() => {
    startBtn.classList.add('show');
}, 1800);

startBtn.onclick = () => {
    musicaIntro.play();

    intro.style.opacity = 0;

    setTimeout(() => {
        intro.style.display = 'none';
        digitalScreen.style.opacity = 1;

        setTimeout(() => {
            digitalImg.classList.add('show');
        }, 200);

        setTimeout(() => {
            digitalScreen.style.opacity = 0;

            setTimeout(() => {
                main.style.display = 'flex';
            }, 800);

        }, 4000);

    }, 1000);
};

/* PRESENTE */
const box = document.getElementById('giftBox');
const photo = document.getElementById('friendPhoto');
const container = document.getElementById('giftContainer');
const clickText = document.getElementById('clickText');

const msg1 = document.getElementById('msg1');
const msg2 = document.getElementById('msg2');
const msg3 = document.getElementById('msg3');
const final = document.getElementById('final');

let clicks = 0;

container.addEventListener('click', () => {
    clicks++;

    box.classList.remove('shake');
    void box.offsetWidth;

    if (clicks < 3) {
        box.classList.add('shake');
        clickText.innerText = `Faltam ${3 - clicks}!`;
    }

    if (clicks === 3) {
        container.style.pointerEvents = 'none';

        box.classList.add('fall');
        photo.classList.add('revealed');

        musica.play();

        let end = Date.now() + 4000;
        (function frame() {
            confetti({ particleCount: 6, angle: 60, spread: 60, origin: { x: 0 } });
            confetti({ particleCount: 6, angle: 120, spread: 60, origin: { x: 1 } });
            if (Date.now() < end) requestAnimationFrame(frame);
        })();

        setTimeout(() => msg1.style.opacity = 1, 800);
        setTimeout(() => msg2.style.opacity = 1, 2000);
        setTimeout(() => msg3.style.opacity = 1, 3500);

        setTimeout(() => final.style.opacity = 1, 6000);
    }
});
</script>

</body>
</html>
