<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Um Presente Especial</title>

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&display=swap" rel="stylesheet">

<style>

/* =========================
   BASE
========================= */

html, body{
    margin:0;
    padding:0;
    min-height:100vh;
    overflow-x:hidden;
    background:#0f0f0f;
}

body{
    background: linear-gradient(-45deg, #0f0f0f, #1a3325, #102118, #0f0f0f);
    background-size:400% 400%;
    animation:gradientBG 15s ease infinite;
    font-family:Arial, sans-serif;
    color:white;
}

@keyframes gradientBG{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* =========================
   ANIMAÇÕES
========================= */

.fade{
    opacity:0;
    transform:translateY(20px);
    transition:1.2s ease;
}

.fade.show{
    opacity:1;
    transform:translateY(0);
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

@keyframes shake{
    0%{transform:translateX(0);}
    25%{transform:translateX(-4px);}
    50%{transform:translateX(4px);}
    75%{transform:translateX(-4px);}
    100%{transform:translateX(0);}
}

/* =========================
   INTRO
========================= */

.intro-screen{
    position:fixed;
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:20;
    transition:1s ease;
}

.intro-text{
    font-family:'Caveat', cursive;
    font-size:34px;
    text-align:center;
    max-width:85%;
}

.start-btn{
    margin-top:30px;
    padding:12px 35px;
    border:none;
    border-radius:25px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    color:white;
    backdrop-filter:blur(10px);
    font-size:17px;
    cursor:pointer;
    transition:0.3s ease;
}

.start-btn:hover{
    transform:scale(1.05);
}

/* =========================
   DESENHO
========================= */

.digital-screen{
    position:fixed;
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    opacity:0;
    transition:1.5s ease;
    z-index:15;
    pointer-events:none;
}

.digital-img{
    width:280px;
    max-width:85%;
    border-radius:18px;
    opacity:0;
    transform:scale(1.4);
    transition:2s ease;
    box-shadow:0 0 25px rgba(46,204,113,0.25);
}

.digital-img.show{
    opacity:1;
    transform:scale(1);
}

/* =========================
   VINIL
========================= */

.vinil-container{
    position:fixed;
    bottom:20px;
    left:20px;
    width:90px;
    height:90px;
    opacity:0;
    transition:1.5s ease;
    z-index:999;
    pointer-events:none;
}

.vinil{
    width:100%;
    height:100%;
    animation:spin 5s linear infinite;
    opacity:0.8;
}

/* =========================
   MAIN
========================= */

.main{
    display:none;
    flex-direction:column;
    align-items:center;
    min-height:100vh;
    padding-top:8vh;
}

/* =========================
   PRESENTE
========================= */

.container{
    position:relative;
    width:280px;
    height:280px;
    max-width:90%;
    cursor:pointer;
}

.gift-box{
    position:absolute;
    width:100%;
    height:100%;
    border-radius:20px;
    background:linear-gradient(135deg, #e74c3c, #c0392b);
    display:flex;
    justify-content:center;
    align-items:center;
    transition:1s ease;
    box-shadow:0 10px 30px rgba(0,0,0,0.45);
    overflow:hidden;
}

.gift-box::before{
    content:'';
    position:absolute;
    width:45px;
    height:100%;
    background:#f1c40f;
}

.gift-box::after{
    content:'';
    position:absolute;
    width:100%;
    height:45px;
    background:#f1c40f;
}

.shake{
    animation:shake 0.4s ease;
}

.fall{
    transform:translateY(120vh) rotate(35deg);
    opacity:0;
}

#clickText{
    position:relative;
    z-index:2;
    font-size:20px;
    font-weight:bold;
    text-shadow:0 2px 4px rgba(0,0,0,0.5);
}

/* =========================
   CARTA
========================= */

.glass-card{
    position:absolute;
    width:100%;
    height:100%;
    border-radius:20px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;

    background:rgba(20,20,20,0.35);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.08);

    opacity:0;
    transition:1s ease;
}

.glass-card.revealed{
    opacity:1;
}

.message{
    font-family:'Caveat', cursive;
    font-size:30px;
    margin:10px;
    opacity:0;
    transition:1s ease;
}

/* =========================
   INSTRUÇÃO
========================= */

.instruction{
    margin-top:18px;
    font-size:15px;
    opacity:0.7;
    text-align:center;
}

/* =========================
   BOTÃO MAIS
========================= */

#moreBtn{
    margin-top:30px;
    padding:10px 28px;
    border:none;
    border-radius:20px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    color:white;
    backdrop-filter:blur(10px);
    cursor:pointer;
    opacity:0;
    transition:0.5s ease;
}

#moreBtn:hover{
    transform:scale(1.05);
}

/* =========================
   EXTRA
========================= */

#extraScreen{
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    text-align:center;
    padding:20px;
}

.extra-phrase{
    font-family:'Caveat', cursive;
    font-size:38px;
    opacity:0;
    transition:1.5s ease;
}

.final-box{
    width:220px;
    max-width:85%;
    margin-top:25px;
    opacity:0;
    transform:translateY(20px);
    transition:1.5s ease;
}

.final-box.show{
    opacity:1;
    transform:translateY(0);
}

/* =========================
   VOLTAR
========================= */

.back-btn{
    position:fixed;
    top:20px;
    left:20px;

    padding:10px 20px;

    border:none;
    border-radius:20px;

    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);

    color:white;
    backdrop-filter:blur(10px);

    cursor:pointer;
}

</style>
</head>
<body>

<!-- INTRO -->
<div class="intro-screen" id="intro">

    <p class="intro-text fade" id="introText">
        Não consegui te ver pessoalmente… então fiz isso aqui
    </p>

    <button class="start-btn fade" id="startBtn">
        abrir presente
    </button>

</div>

<!-- DESENHO -->
<div class="digital-screen" id="digitalScreen">
    <img src="digital.png" class="digital-img" id="digitalImg">
</div>

<!-- VINIL -->
<div class="vinil-container" id="vinilContainer">
    <img src="vinil.png" class="vinil">
</div>

<!-- MAIN -->
<div class="main" id="mainContent">

    <div class="container" id="giftContainer">

        <!-- CARTA -->
        <div class="glass-card" id="glassCard">

            <p class="message" id="msg1">
                Feliz aniversário, irmão 🎉
            </p>

            <p class="message" id="msg2">
                Tu é importante pra caramba pra mim
            </p>

            <p class="message" id="msg3">
                Isso aqui é só uma parte…
            </p>

        </div>

        <!-- CAIXA -->
        <div class="gift-box" id="giftBox">
            <p id="clickText">Aperte 3 vezes!</p>
        </div>

    </div>

    <!-- INSTRUÇÃO -->
    <p class="instruction">
        clique no presente 3 vezes para abrir
    </p>

    <!-- MAIS -->
    <button id="moreBtn">
        mais
    </button>

</div>

<!-- EXTRA -->
<div id="extraScreen">

    <button class="back-btn" onclick="voltar()">
        voltar
    </button>

    <p class="extra-phrase" id="extraPhrase">
        Eu queria muito te entregar essa caixa…<br>
        mas de algum jeito,<br>
        <b>algum dia ela vai chegar até você.</b>
    </p>

    <img src="caixa.png" class="final-box" id="finalBox">

</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

/* =========================
   ELEMENTOS
========================= */

const intro = document.getElementById('intro');
const introText = document.getElementById('introText');
const startBtn = document.getElementById('startBtn');

const digitalScreen = document.getElementById('digitalScreen');
const digitalImg = document.getElementById('digitalImg');

const vinilContainer = document.getElementById('vinilContainer');

const main = document.getElementById('mainContent');

const musicaIntro = new Audio('aero.mp3');
musicaIntro.loop = true;

/* =========================
   INTRO
========================= */

setTimeout(()=>{
    introText.classList.add('show');
},200);

setTimeout(()=>{
    startBtn.classList.add('show');
},1500);

startBtn.onclick = () => {

    musicaIntro.play();

    intro.style.opacity = 0;

    setTimeout(()=>{

        intro.style.display = 'none';

        digitalScreen.style.opacity = 1;
        vinilContainer.style.opacity = 1;

        setTimeout(()=>{
            digitalImg.classList.add('show');
        },300);

        /* CONFETE INTRO */
        let end = Date.now() + 3000;

        (function frame(){

            confetti({
                particleCount:6,
                angle:60,
                spread:70,
                origin:{x:0}
            });

            confetti({
                particleCount:6,
                angle:120,
                spread:70,
                origin:{x:1}
            });

            if(Date.now() < end){
                requestAnimationFrame(frame);
            }

        })();

        setTimeout(()=>{

            digitalScreen.style.opacity = 0;

            setTimeout(()=>{
                digitalScreen.style.display = 'none';
                main.style.display = 'flex';
            },1500);

        },4000);

    },1000);

};

/* =========================
   PRESENTE
========================= */

const container = document.getElementById('giftContainer');
const box = document.getElementById('giftBox');
const clickText = document.getElementById('clickText');

const glassCard = document.getElementById('glassCard');

const msg1 = document.getElementById('msg1');
const msg2 = document.getElementById('msg2');
const msg3 = document.getElementById('msg3');

const moreBtn = document.getElementById('moreBtn');

let clicks = 0;

container.addEventListener('click', ()=>{

    clicks++;

    box.classList.remove('shake');
    void box.offsetWidth;

    if(clicks < 3){

        box.classList.add('shake');

        clickText.innerText =
        `Faltam ${3 - clicks}!`;

    }

    if(clicks === 3){

        container.style.pointerEvents = 'none';

        box.classList.add('fall');

        glassCard.classList.add('revealed');

        /* CONFETE */
        let end = Date.now() + 4000;

        (function frame(){

            confetti({
                particleCount:8,
                angle:60,
                spread:60,
                origin:{x:0}
            });

            confetti({
                particleCount:8,
                angle:120,
                spread:60,
                origin:{x:1}
            });

            if(Date.now() < end){
                requestAnimationFrame(frame);
            }

        })();

        setTimeout(()=>{
            msg1.style.opacity = 1;
        },800);

        setTimeout(()=>{
            msg2.style.opacity = 1;
        },2000);

        setTimeout(()=>{
            msg3.style.opacity = 1;
        },3500);

        setTimeout(()=>{
            moreBtn.style.opacity = 1;
        },5000);

    }

});

/* =========================
   EXTRA
========================= */

const extraScreen = document.getElementById('extraScreen');
const extraPhrase = document.getElementById('extraPhrase');
const finalBox = document.getElementById('finalBox');

moreBtn.onclick = () => {

    main.style.display = 'none';

    extraScreen.style.display = 'flex';

    setTimeout(()=>{
        extraPhrase.style.opacity = 1;
    },200);

    setTimeout(()=>{
        finalBox.classList.add('show');
    },1800);

};

function voltar(){

    extraScreen.style.display = 'none';

    main.style.display = 'flex';

    extraPhrase.style.opacity = 0;

    finalBox.classList.remove('show');

}

</script>

</body>
</html>
